<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Hidroneumático – Bypass</title>
<style>
  :root { --blue:#0d6eac; --green:#1a8a3a; --red:#cc2200; --orange:#d4600a; --dim:#4a5568; --panel:#f4f6f9; --border:#ccd0da; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#fff; color:#1e2535; font-family:Arial,sans-serif; padding:24px; }
  h1 { font-family:monospace; font-size:1.7rem; color:var(--blue); letter-spacing:2px; text-transform:uppercase; margin-bottom:3px; }
  .subtitle { font-size:1.05rem; color:var(--dim); font-family:monospace; }
  .author   { font-size:1.0rem; color:var(--dim); font-family:monospace; opacity:.75; margin-top:2px; margin-bottom:22px; }
  .mode-tabs { display:flex; gap:10px; margin-bottom:32px; flex-wrap:wrap; padding-bottom:28px; }
  .mode-btn { padding:10px 20px; border:1.5px solid var(--border); background:var(--panel); color:var(--dim);
    font-family:Arial,sans-serif; font-weight:700; font-size:1.1rem; cursor:pointer; border-radius:5px;
    transition:all .2s; text-transform:uppercase; letter-spacing:1px; }
  .mode-btn.active { background:#dbeeff; border-color:var(--blue); color:#0d3a5a; }
  .mode-btn:hover:not(.active) { border-color:#888; color:#1e2535; }
  @keyframes pulse-ring { 0%{box-shadow:0 0 0 0 rgba(13,110,172,.55)} 70%{box-shadow:0 0 0 10px rgba(13,110,172,0)} 100%{box-shadow:0 0 0 0 rgba(13,110,172,0)} }
  .pulse-hint { animation:pulse-ring 1.4s ease-out infinite; position:relative; }
  .pulse-hint::after { content:"👆 toca para ver"; position:absolute; bottom:-24px; left:50%;
    transform:translateX(-50%); font-size:.9rem; color:var(--blue); white-space:nowrap; font-weight:600; pointer-events:none; }
  .mode-label { background:var(--panel); border:1px solid var(--border); border-left:4px solid var(--blue);
    padding:13px 18px; margin-bottom:20px; border-radius:5px; }
  .mode-label h2 { font-size:1.3rem; font-weight:700; margin-bottom:5px; }
  .mode-label p  { font-size:1.1rem; color:var(--dim); line-height:1.55; }
  .diagram-wrap { background:var(--panel); border:1px solid var(--border); border-radius:7px; padding:20px; margin-bottom:20px; overflow-x:auto; }
  svg { display:block; margin:0 auto; max-width:100%; }
  .flow-active   { stroke-dasharray:14 6; animation:dash .7s linear infinite; }
  .flow-inactive { opacity:.35; stroke:#b0bec5 !important; stroke-dasharray:none !important; animation:none !important; }
  @keyframes dash { to { stroke-dashoffset:-20; } }
  .vtable { background:var(--panel); border:1px solid var(--border); border-radius:7px; overflow:hidden; }
  .vtable table { width:100%; border-collapse:collapse; }
  .vtable thead { background:#e8edf4; }
  .vtable th { padding:9px 14px; text-align:left; font-size:.95rem; font-family:monospace; color:#3a5070; letter-spacing:1.5px; text-transform:uppercase; border-bottom:1px solid var(--border); }
  .vtable td { padding:9px 14px; font-size:1.1rem; border-bottom:1px solid #dde2ec; }
  .vtable tr:last-child td { border-bottom:none; }
  .vtable tr:hover td { background:#edf4ff; }
  .vn { font-family:monospace; font-size:1.1rem; color:var(--blue); font-weight:bold; }
  .so { color:var(--green); font-weight:700; }
  .sc { color:var(--red);   font-weight:700; }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:5px; vertical-align:middle; }
  .do { background:var(--green); } .dc { background:var(--red); }
</style>
</head>

<script>
const B = "#0d6eac", O = "#d4600a";
const ALL = ["pc-pot","pp-pot","pn-pot","ps-pot","pb-pot",
             "p-bypass",
             "pb-plu","pn-plu","ps-plu","pn2-plu","pp-plu","pc-plu"];

const modes = [
  {
    title: "MODO 1 – Operación Independiente (Normal)",
    desc:  "VP2 abierta: CB Potable surte Reg/Dpto normalmente. VP1 abierta: CB Pluvial surte WC normalmente. VBR y VBP cerradas: bypass aislado. Ambos sistemas trabajan de forma completamente autónoma.",
    valves:{
      VP2:{open:true,  room:"Potable", fn:"Anti-retorno bombas", note:"Abierta — CB Potable en servicio normal"},
      VBR:{open:false, room:"Potable", fn:"Válvula de Bypass",   note:"Cerrada — potable aislado del bypass"},
      VBP:{open:false, room:"Pluvial", fn:"Válvula de Bypass",   note:"Cerrada — pluvial aislado del bypass"},
      VP1:{open:true,  room:"Pluvial", fn:"Anti-retorno bombas", note:"Abierta — CB Pluvial en servicio normal"}
    },
    pipes:{
      "pc-pot":{on:true, c:B},"pp-pot":{on:true, c:B},"pn-pot":{on:true, c:B},"ps-pot":{on:true, c:B},
      "pb-pot":{on:false,c:"#aaa"},
      "p-bypass":{on:false,c:"#aaa"},
      "pb-plu":{on:false,c:"#aaa"},
      "pn-plu":{on:true, c:B},"ps-plu":{on:true, c:B},"pn2-plu":{on:true, c:B},"pp-plu":{on:true, c:B},"pc-plu":{on:true, c:B}
    }
  },
  {
    title: "MODO 2 – CB Potable surte ambos (CB Pluvial fuera de servicio)",
    desc:  "CB Pluvial fuera de servicio. VP1 cerrada: evita que el agua regrese hacia las bombas pluvial. VBP abierta: el agua del bypass llega al nodo pluvial y surte WC. Bypass activo. VBR abierta: CB Potable manda flujo al bypass. VP2 abierta: CB Potable sigue surtiendo Reg/Dpto normalmente.",
    valves:{
      VP2:{open:true,  room:"Potable", fn:"Anti-retorno bombas", note:"ABIERTA — CB Potable surte Reg/Dpto normalmente"},
      VBR:{open:true,  room:"Potable", fn:"Válvula de Bypass",   note:"ABIERTA — CB Potable manda flujo al bypass"},
      VBP:{open:true,  room:"Pluvial", fn:"Válvula de Bypass",   note:"ABIERTA — flujo del bypass entra y surte WC"},
      VP1:{open:false, room:"Pluvial", fn:"Anti-retorno bombas", note:"CERRADA — evita retorno hacia bombas pluvial"}
    },
    pipes:{
      "pc-pot":{on:true, c:B},"pp-pot":{on:true, c:B},"pn-pot":{on:true, c:B},"ps-pot":{on:true, c:B},
      "pb-pot":{on:true, c:O},
      "p-bypass":{on:true, c:O},
      "pb-plu":{on:true, c:O},
      "pn-plu":{on:true, c:O},"ps-plu":{on:true, c:O},"pn2-plu":{on:false,c:"#aaa"},"pp-plu":{on:false,c:"#aaa"},"pc-plu":{on:false,c:"#aaa"}
    }
  },
  {
    title: "MODO 3 – CB Pluvial surte ambos (CB Potable fuera de servicio)",
    desc:  "CB Potable fuera de servicio. VP2 cerrada: evita que el agua regrese hacia las bombas potable. VBR abierta: el agua del bypass llega al nodo potable y surte Reg/Dpto. Bypass activo. VBP abierta: CB Pluvial manda flujo al bypass. VP1 abierta: CB Pluvial sigue surtiendo WC normalmente.",
    valves:{
      VP2:{open:false, room:"Potable", fn:"Anti-retorno bombas", note:"CERRADA — evita retorno hacia bombas potable"},
      VBR:{open:true,  room:"Potable", fn:"Válvula de Bypass",   note:"ABIERTA — flujo del bypass entra y surte Reg/Dpto"},
      VBP:{open:true,  room:"Pluvial", fn:"Válvula de Bypass",   note:"ABIERTA — CB Pluvial manda flujo al bypass"},
      VP1:{open:true,  room:"Pluvial", fn:"Anti-retorno bombas", note:"ABIERTA — CB Pluvial surte WC normalmente"}
    },
    pipes:{
      "pc-pot":{on:false,c:"#aaa"},"pp-pot":{on:false,c:"#aaa"},"pn-pot":{on:false,c:"#aaa"},"ps-pot":{on:true, c:O},
      "pb-pot":{on:true, c:O},
      "p-bypass":{on:true, c:O},
      "pb-plu":{on:true, c:O},
      "pn-plu":{on:true, c:O},"ps-plu":{on:true, c:B},"pn2-plu":{on:true, c:B},"pp-plu":{on:true, c:B},"pc-plu":{on:true, c:B}
    }
  }
];

let cur = 0;
function setMode(i){
  cur = i;
  document.querySelectorAll('.mode-btn').forEach((b,j)=>{
    b.classList.toggle('active', j===i);
    b.classList.remove('pulse-hint');
  });
  render();
}
function render(){
  const m = modes[cur];
  document.getElementById('modeTitle').textContent = m.title;
  document.getElementById('modeDesc').textContent  = m.desc;
  ALL.forEach(id=>{
    const el=document.getElementById(id); if(!el) return;
    const p=m.pipes[id];
    if(p.on){
      el.classList.add('flow-active'); el.classList.remove('flow-inactive');
      el.setAttribute('stroke',p.c); el.setAttribute('opacity','1');
    } else {
      el.classList.remove('flow-active'); el.classList.add('flow-inactive');
      el.setAttribute('stroke','#b0bec5'); el.setAttribute('opacity','0.4');
    }
  });
  const smap={VP1:'vp1-stem',VP2:'vp2-stem',VBP:'vbp-stem',VBR:'vbr-stem'};
  ['VP1','VP2','VBP','VBR'].forEach(id=>{
    const open=m.valves[id].open, col=open?'#1a8a3a':'#cc2200';
    const s=document.getElementById(smap[id]), g=document.getElementById('valve-'+id);
    if(!g||!s) return;
    g.querySelector('rect').setAttribute('stroke',col);
    s.setAttribute('stroke',col);
    if(open){ const mx=parseFloat(s.getAttribute('x2')), my=(parseFloat(s.getAttribute('y1'))+parseFloat(s.getAttribute('y2')))/2;
      s.setAttribute('transform','rotate(90,'+mx+','+my+')'); }
    else s.removeAttribute('transform');
  });
  const tb=document.getElementById('valveRows'); tb.innerHTML='';
  ['VP2','VBR','VBP','VP1'].forEach(id=>{
    const v=m.valves[id], tr=document.createElement('tr');
    tr.innerHTML='<td><span class="vn">'+id+'</span></td>'+
      '<td style="color:#4a5568">'+v.room+'</td>'+
      '<td style="color:#4a5568;font-size:.95rem">'+v.fn+'</td>'+
      '<td><span class="dot '+(v.open?'do':'dc')+'"></span><span class="'+(v.open?'so':'sc')+'">'+(v.open?'● ABIERTA':'● CERRADA')+'</span></td>'+
      '<td style="color:#5a6a80;font-size:.95rem">'+v.note+'</td>';
    tb.appendChild(tr);
  });
}
render();
</script>
</body>
</html>
