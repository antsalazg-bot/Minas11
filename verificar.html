<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#18120a">
<title>Verificar Recibo · Real de Minas 11</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#18120a;--cream:#f8f4ed;--gold:#c49a22;--sage:#3a5c3c;--red:#8b1a1a;--bdr:rgba(24,18,10,.10);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;}

.card{background:#fff;border:1px solid var(--bdr);border-radius:4px;width:100%;max-width:440px;
  box-shadow:0 8px 40px rgba(24,18,10,.10);overflow:hidden;}

.card-top{height:5px;}
.card-top.valido{background:linear-gradient(90deg,var(--sage),#4d7a50);}
.card-top.invalido{background:linear-gradient(90deg,var(--red),#c0392b);}
.card-top.cargando{background:linear-gradient(90deg,var(--gold),#e8b84b);animation:slide 1.4s infinite linear;}
@keyframes slide{0%{background-position:0% 50%}100%{background-position:200% 50%}}

.card-body{padding:2.5rem 2rem;}

.brand{text-align:center;margin-bottom:2rem;}
.brand-badge{display:inline-block;background:var(--ink);color:var(--gold);font-size:.6rem;
  font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:.25rem .7rem;
  border-radius:2px;margin-bottom:.8rem;}
.brand h1{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:500;letter-spacing:-.01em;}
.brand p{font-size:.7rem;color:rgba(24,18,10,.4);letter-spacing:.08em;text-transform:uppercase;margin-top:.3rem;}

/* Estado */
.estado{text-align:center;padding:1.5rem 0 1rem;}
.estado-icon{font-size:3.5rem;line-height:1;margin-bottom:.6rem;}
.estado-label{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:500;}
.estado-label.valido{color:var(--sage);}
.estado-label.invalido{color:var(--red);}
.estado-sub{font-size:.8rem;color:rgba(24,18,10,.45);margin-top:.3rem;}

/* Spinner */
.spinner{width:2.5rem;height:2.5rem;border:3px solid var(--bdr);border-top-color:var(--gold);
  border-radius:50%;animation:spin .8s linear infinite;margin:1.5rem auto;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Detalles del recibo */
.detalles{border:1px solid var(--bdr);border-radius:3px;overflow:hidden;margin-top:1.2rem;}
.det-row{display:flex;border-bottom:1px solid var(--bdr);font-size:.82rem;}
.det-row:last-child{border-bottom:none;}
.det-lbl{padding:.6rem .9rem;background:var(--cream);color:rgba(24,18,10,.5);font-size:.7rem;
  font-weight:700;letter-spacing:.07em;text-transform:uppercase;width:42%;flex-shrink:0;}
.det-val{padding:.6rem .9rem;color:var(--ink);}
.det-val.monto{font-family:'Fraunces',serif;font-size:1.1rem;color:var(--sage);font-weight:500;}
.det-val.cancelado{color:var(--red);}

/* Folio */
.folio-wrap{margin-top:1rem;text-align:center;}
.folio-badge{display:inline-block;background:var(--cream);border:1px solid var(--bdr);
  border-radius:2px;padding:.35rem .9rem;font-size:.75rem;font-weight:600;letter-spacing:.07em;
  color:rgba(24,18,10,.5);}

/* Footer */
.card-footer{padding:1rem 2rem;border-top:1px solid var(--bdr);background:var(--cream);
  text-align:center;font-size:.68rem;color:rgba(24,18,10,.35);}
</style>
</head>
<body>

<div class="card" id="card">
  <div class="card-top cargando" id="card-top"></div>
  <div class="card-body">
    <div class="brand">
      <div class="brand-badge">Verificación</div>
      <h1>Real de Minas 11</h1>
      <p>Autenticidad de recibo de pago</p>
    </div>

    <div id="contenido">
      <div class="spinner"></div>
      <p style="text-align:center;font-size:.82rem;color:rgba(24,18,10,.4)">Verificando recibo…</p>
    </div>
  </div>
  <div class="card-footer">Verificación en tiempo real · Real de Minas 11</div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby1rDCDDft-X2nF7-MlzGaL6c4_81XeWyt2XwraBnyruLSfuJRXCuKTk-mLGDy2iEwx/exec';

function fmt(n){
  return '$' + Number(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function renderValido(data){
  const top = document.getElementById('card-top');
  top.className = 'card-top valido';
  document.getElementById('contenido').innerHTML = `
    <div class="estado">
      <div class="estado-icon">✅</div>
      <div class="estado-label valido">Recibo válido</div>
      <div class="estado-sub">Este recibo es auténtico y está vigente</div>
    </div>
    <div class="detalles">
      <div class="det-row"><div class="det-lbl">Folio</div><div class="det-val">${data.folio}</div></div>
      <div class="det-row"><div class="det-lbl">Departamento</div><div class="det-val">${data.depto}</div></div>
      <div class="det-row"><div class="det-lbl">Propietario</div><div class="det-val">${data.nombre}</div></div>
      <div class="det-row"><div class="det-lbl">Mes</div><div class="det-val">${data.mes}</div></div>
      <div class="det-row"><div class="det-lbl">Fecha de pago</div><div class="det-val">${data.fecha}</div></div>
      <div class="det-row"><div class="det-lbl">Monto</div><div class="det-val monto">${fmt(data.monto)}</div></div>
    </div>`;
}

function renderCancelado(data){
  const top = document.getElementById('card-top');
  top.className = 'card-top invalido';
  document.getElementById('contenido').innerHTML = `
    <div class="estado">
      <div class="estado-icon">❌</div>
      <div class="estado-label invalido">Recibo cancelado</div>
      <div class="estado-sub">Este recibo fue dado de baja y ya no tiene validez</div>
    </div>
    <div class="detalles">
      <div class="det-row"><div class="det-lbl">Folio</div><div class="det-val cancelado">${data.folio}</div></div>
      <div class="det-row"><div class="det-lbl">Departamento</div><div class="det-val">${data.depto}</div></div>
      <div class="det-row"><div class="det-lbl">Mes</div><div class="det-val">${data.mes}</div></div>
      <div class="det-row"><div class="det-lbl">Monto</div><div class="det-val">${fmt(data.monto)}</div></div>
      <div class="det-row"><div class="det-lbl">Estado</div><div class="det-val cancelado">CANCELADO</div></div>
    </div>`;
}

function renderInvalido(msg){
  const top = document.getElementById('card-top');
  top.className = 'card-top invalido';
  document.getElementById('contenido').innerHTML = `
    <div class="estado">
      <div class="estado-icon">⚠️</div>
      <div class="estado-label invalido">No verificado</div>
      <div class="estado-sub">${msg || 'No se pudo verificar este recibo'}</div>
    </div>
    <div class="folio-wrap">
      <span class="folio-badge">Contacta a la administración para más información</span>
    </div>`;
}

async function verificar(){
  const params = new URLSearchParams(window.location.search);
  const folio  = params.get('f') || '';
  const token  = params.get('t') || '';

  if(!folio || !token){
    renderInvalido('URL de verificación incompleta o inválida.');
    return;
  }

  try{
    const res  = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({accion:'verificar-recibo', folio, token})
    });
    const data = await res.json();

    if(!data.ok){
      renderInvalido(data.error || 'Error al consultar los registros.');
      return;
    }
    if(data.valido)          renderValido(data);
    else if(data.estado === 'cancelado') renderCancelado(data);
    else                     renderInvalido(data.mensaje || 'Recibo no encontrado.');
  } catch(e){
    renderInvalido('Error de conexión. Intenta de nuevo en unos momentos.');
  }
}

verificar();
</script>
</body>
</html>
